<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>iOS 画布切换</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #d1d1d6;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }

    #canvas {
      width: 375px;
      height: 812px;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.3);
      position: relative;
    }

    #display {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>
  <div id="canvas">
    <img id="display" src="底图.png" alt="">
  </div>

  <script>
    const display = document.getElementById('display');
    const canvas = document.getElementById('canvas');

    let isPlaying = false;
    sessionStorage.removeItem('fromDoodle');

    function getXY(e) {
      if (e.changedTouches && e.changedTouches.length > 0) {
        return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
      }
      return { x: e.clientX, y: e.clientY };
    }

    // 所有触摸事件统一由 canvas 捕获，统一用 canvas 的 rect 计算坐标
    canvas.addEventListener('touchend', function(e) {
      e.preventDefault();
      const pt = getXY(e);
      const rect = canvas.getBoundingClientRect();
      const x = pt.x - rect.left;
      const y = pt.y - rect.top;

      if (isPlaying) {
        // 在播放态：点击中间区域切回底图，点击按钮区域跳转
        const leftBound = rect.width * 0.2;
        const rightBound = rect.width * 0.8;
        if (x >= leftBound && x <= rightBound) {
          display.src = '底图.png';
          isPlaying = false;
        }
        // 按钮在画布坐标 (348, 350)，允许 33px 半径
        const dist = Math.hypot(x - 348, y - 350);
        if (dist <= 33) {
          display.src = '空白.png';
          sessionStorage.setItem('fromDoodle', '1');
          setTimeout(() => { window.location.href = '涂鸦编辑.html'; }, 300);
        }
      } else {
        display.src = '播放态.png';
        isPlaying = true;
      }
    }, { passive: false });

    // 桌面端点击
    canvas.addEventListener('click', function(e) {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      if (isPlaying) {
        const leftBound = rect.width * 0.2;
        const rightBound = rect.width * 0.8;
        if (x >= leftBound && x <= rightBound) {
          display.src = '底图.png';
          isPlaying = false;
        }
        const dist = Math.hypot(x - 348, y - 350);
        if (dist <= 33) {
          display.src = '空白.png';
          sessionStorage.setItem('fromDoodle', '1');
          setTimeout(() => { window.location.href = '涂鸦编辑.html'; }, 300);
        }
      } else {
        display.src = '播放态.png';
        isPlaying = true;
      }
    });
  </script>
</body>
</html>
