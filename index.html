<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>iOS 画布切换</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #d1d1d6;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }

    #canvas {
      width: 375px;
      height: 812px;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.3);
      position: relative;
    }

    #canvas img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="canvas">
    <img id="display" src="底图.png" alt="">
  </div>

  <script>
    const display = document.getElementById('display');
    const canvas = document.getElementById('canvas');

    let isPlaying = false;
    sessionStorage.removeItem('fromDoodle');

    function getXY(e) {
      if (e.touches && e.touches.length > 0) {
        return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
      if (e.changedTouches && e.changedTouches.length > 0) {
        return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
      }
      return { x: e.clientX, y: e.clientY };
    }

    // 只监听 canvas 层，手机触摸直接用 touchend，坐标通过 changedTouches 获取
    canvas.addEventListener('touchend', function(e) {
      e.preventDefault();
      const pt = getXY(e);
      const rect = canvas.getBoundingClientRect();
      const clickX = pt.x - rect.left;

      if (isPlaying) {
        const leftBound = rect.width * 0.2;
        const rightBound = rect.width * 0.8;
        if (clickX >= leftBound && clickX <= rightBound) {
          display.src = '底图.png';
          isPlaying = false;
        }
      } else {
        display.src = '播放态.png';
        isPlaying = true;
      }
    }, { passive: false });

    display.addEventListener('touchend', function(e) {
      if (!isPlaying) return;
      e.preventDefault();
      const pt = getXY(e);
      const rect = display.getBoundingClientRect();
      const clickX = pt.x - rect.left;
      const clickY = pt.y - rect.top;
      const dist = Math.hypot(clickX - 348, clickY - 350);
      if (dist <= 33) {
        display.src = '空白.png';
        sessionStorage.setItem('fromDoodle', '1');
        setTimeout(() => { window.location.href = '涂鸦编辑.html'; }, 300);
      }
    }, { passive: false });

    // 桌面端 click
    canvas.addEventListener('click', function(e) {
      const rect = canvas.getBoundingClientRect();
      const clickX = e.clientX - rect.left;

      if (isPlaying) {
        const leftBound = rect.width * 0.2;
        const rightBound = rect.width * 0.8;
        if (clickX >= leftBound && clickX <= rightBound) {
          display.src = '底图.png';
          isPlaying = false;
        }
      } else {
        display.src = '播放态.png';
        isPlaying = true;
      }
    });

    display.addEventListener('click', function(e) {
      if (!isPlaying) return;
      const rect = display.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const clickY = e.clientY - rect.top;
      const dist = Math.hypot(clickX - 348, clickY - 350);
      if (dist <= 33) {
        display.src = '空白.png';
        sessionStorage.setItem('fromDoodle', '1');
        setTimeout(() => { window.location.href = '涂鸦编辑.html'; }, 300);
      }
    });
  </script>
</body>
</html>
